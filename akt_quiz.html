<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АКТ Тест 2025-2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 36px;
    max-width: 660px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    color: #fff;
  }
  .title {
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(90deg, #a78bfa, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .subtitle { color: rgba(255,255,255,0.55); margin-bottom: 28px; font-size: 1rem; }
  .info { color: rgba(255,255,255,0.45); font-size: 0.9rem; line-height: 2; margin-bottom: 28px; }
  .btn {
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 36px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(124,58,237,0.5);
    transition: transform 0.15s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-sm { padding: 10px 26px; font-size: 0.95rem; }

  .progress-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    height: 6px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #a78bfa, #38bdf8);
    border-radius: 999px;
    transition: width 0.3s;
  }
  .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .tag { color: rgba(255,255,255,0.45); font-size: 0.85rem; }
  .timer {
    padding: 4px 14px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.9rem;
    transition: background 0.3s, border-color 0.3s;
  }
  .timer.green  { background: rgba(34,197,94,0.2);  border: 1px solid #22c55e; color: #86efac; }
  .timer.yellow { background: rgba(251,191,36,0.2); border: 1px solid #fbbf24; color: #fde68a; }
  .timer.red    { background: rgba(239,68,68,0.2);  border: 1px solid #ef4444; color: #fca5a5; }

  .question { font-size: 1.1rem; font-weight: 600; margin-bottom: 22px; line-height: 1.6; color: #f1f5f9; }

  .opt {
    width: 100%;
    text-align: left;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 13px 18px;
    color: #f1f5f9;
    font-size: 0.95rem;
    cursor: pointer;
    margin-bottom: 10px;
    display: block;
    transition: background 0.2s, border-color 0.2s;
    font-family: inherit;
  }
  .opt:hover:not(.disabled) { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
  .opt.correct  { background: rgba(34,197,94,0.25);  border-color: #22c55e; }
  .opt.wrong    { background: rgba(239,68,68,0.25);  border-color: #ef4444; }
  .opt.disabled { cursor: default; }
  .opt .letter  { opacity: 0.5; font-weight: 700; margin-right: 10px; }

  .next-wrap { margin-top: 16px; text-align: right; }

  /* Results */
  .score-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 0 40px rgba(124,58,237,0.5);
  }
  .score-num { font-size: 2.6rem; font-weight: 900; }
  .score-of  { font-size: 0.8rem; color: rgba(255,255,255,0.7); }
  .grade { text-align: center; font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
  .pct   { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
  .review { max-height: 260px; overflow-y: auto; margin-bottom: 24px; padding-right: 4px; }
  .review-row {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 0.85rem; margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .review-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .review-q   { color: rgba(255,255,255,0.6); flex: 1; }
  .review-ans { color: #86efac; font-size: 0.8rem; margin-top: 3px; }
  .review-wrong-ans { color: #fca5a5; font-size: 0.8rem; margin-top: 3px; }
  .review::-webkit-scrollbar { width: 4px; }
  .review::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
  .review::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
</style>
</head>

const QUIZ_SIZE = 20;
const LETTERS = ["A","B","C","D","E"];

let state = { screen: "home", questions: [], current: 0, selected: null, answers: [], showFeedback: false, timeLeft: 30, timerInterval: null };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  clearInterval(state.timerInterval);
  const qs = shuffle(ALL_QUESTIONS).slice(0, QUIZ_SIZE).map(q => {
    const opts = q.o.map((text, i) => ({ text, orig: i }));
    const shuffled = shuffle(opts);
    const correctIdx = shuffled.findIndex(o => o.orig === q.a);
    return { q: q.q, opts: shuffled.map(o => o.text), correctIdx };
  });
  state = { screen: "quiz", questions: qs, current: 0, selected: null, answers: [], showFeedback: false, timeLeft: 30, timerInterval: null };
  render();
  startTimer();
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      handleAnswer(null);
    } else {
      updateTimer();
    }
  }, 1000);
}

function updateTimer() {
  const el = document.getElementById("timer");
  if (!el) return;
  const pct = (state.timeLeft / 30) * 100;
  el.textContent = "⏱ " + state.timeLeft + "с";
  el.className = "timer " + (pct > 50 ? "green" : pct > 25 ? "yellow" : "red");
}

function handleAnswer(idx) {
  if (state.showFeedback) return;
  clearInterval(state.timerInterval);
  state.selected = idx;
  state.showFeedback = true;
  const q = state.questions[state.current];
  state.answers.push({ chosen: idx, correct: q.correctIdx });
  render();
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.questions.length) {
    state.screen = "results";
    render();
  } else {
    state.selected = null;
    state.showFeedback = false;
    state.timeLeft = 30;
    render();
    startTimer();
  }
}

function render() {
  const app = document.getElementById("app");
  if (state.screen === "home") {
    app.innerHTML = `
      <div class="title">АКТ Тест</div>
      <div class="subtitle">2025–2026 · 1-семестр</div>
      <div class="info">
        ✦ Барлығы ${ALL_QUESTIONS.length} сұрақ қорынан ${QUIZ_SIZE} сұрақ кездейсоқ таңдалады<br>
        ✦ Жауаптар да кездейсоқ аралас болады<br>
        ✦ Әр сұраққа 30 секунд уақыт беріледі
      </div>
      <button class="btn" onclick="startQuiz()">Бастау →</button>
    `;
    return;
  }

  if (state.screen === "results") {
    const score = state.answers.filter(a => a.chosen === a.correct).length;
    const pct = Math.round((score / QUIZ_SIZE) * 100);
    const grade = pct >= 90 ? "Өте жақсы! 🎉" : pct >= 70 ? "Жақсы! 👍" : pct >= 50 ? "Қанағаттанарлық 📚" : "Қайтадан оқып шығыңыз 💪";
    const rows = state.answers.map((a, i) => {
      const q = state.questions[i];
      const correct = a.chosen === a.correct;
      return `<div class="review-row">
        <span class="review-icon">${correct ? "✅" : "❌"}</span>
        <div>
          <div class="review-q">${i+1}. ${q.q.length > 60 ? q.q.slice(0,60)+"…" : q.q}</div>
          ${!correct ? `<div class="review-wrong-ans">Сіздің: ${a.chosen !== null ? q.opts[a.chosen].slice(0,40) : "жауап берілмеді"}</div>
          <div class="review-ans">Дұрысы: ${q.opts[q.correctIdx].slice(0,40)}</div>` : ""}
        </div>
      </div>`;
    }).join("");
    app.innerHTML = `
      <div class="title">Нәтиже</div>
      <div class="score-circle">
        <div class="score-num">${score}</div>
        <div class="score-of">/ ${QUIZ_SIZE}</div>
      </div>
      <div class="grade">${grade}</div>
      <div class="pct">${pct}% дұрыс жауап</div>
      <div class="review">${rows}</div>
      <button class="btn" onclick="startQuiz()">Қайтадан тапсыру →</button>
    `;
    return;
  }

  // Quiz
  const q = state.questions[state.current];
  const pct = (state.timeLeft / 30) * 100;
  const timerClass = pct > 50 ? "green" : pct > 25 ? "yellow" : "red";
  const progressPct = ((state.current + 1) / QUIZ_SIZE) * 100;

  const opts = q.opts.map((opt, i) => {
    let cls = "opt";
    if (state.showFeedback) {
      if (i === q.correctIdx) cls += " correct disabled";
      else if (i === state.selected) cls += " wrong disabled";
      else cls += " disabled";
    }
    const click = state.showFeedback ? "" : `onclick="handleAnswer(${i})"`;
    return `<button class="${cls}" ${click}><span class="letter">${LETTERS[i]}</span>${opt}</button>`;
  }).join("");

  const nextBtn = state.showFeedback
    ? `<div class="next-wrap"><button class="btn btn-sm" onclick="nextQuestion()">${state.current + 1 >= QUIZ_SIZE ? "Нәтижені көру" : "Келесі →"}</button></div>`
    : "";

  app.innerHTML = `
    <div class="meta">
      <div class="tag">Сұрақ ${state.current + 1} / ${QUIZ_SIZE}</div>
      <div class="timer ${timerClass}" id="timer">⏱ ${state.timeLeft}с</div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${progressPct}%"></div></div>
    <div class="question">${q.q}</div>
    ${opts}
    ${nextBtn}
  `;
}

render();
</script>
